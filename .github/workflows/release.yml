name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write  # PyPI Trusted Publishing (OIDC)

jobs:
  # ── Pre-release Checks ─────────────────────────────────────────
  check:
    name: Pre-release Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4

      - name: Install dependencies
        run: uv sync --dev

      - name: Ruff lint (src + tests)
        run: uv run ruff check src/ tests/

      - name: Ruff format check (src + tests)
        run: uv run ruff format --check src/ tests/

      - name: Mypy (src + tests)
        run: uv run mypy src/ tests/

      - name: Full test suite
        run: uv run pytest --tb=short -q

  # ── Build & Publish ────────────────────────────────────────────
  build:
    name: Build & Publish
    runs-on: ubuntu-latest
    needs: check
    environment: pypi  # 需在 GitHub 仓库 Settings > Environments 中创建 pypi 环境
    permissions:
      contents: write
      id-token: write  # OIDC 签名
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # git-cliff 需要完整历史

      - uses: astral-sh/setup-uv@v4

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: cliff.toml
          args: --tag ${{ github.ref_name }}
        env:
          OUTPUT: CHANGELOG.md

      - name: Build package
        run: uv build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body: ${{ steps.git-cliff.outputs.content }}

      - name: Commit changelog and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "chore(release): update CHANGELOG.md for ${{ github.ref_name }}"
          git push origin HEAD:main

      - name: Publish to PyPI (Trusted Publishing / OIDC)
        run: uv publish
